  .cs-h b{font-size:14px;color:#0A4ED9}
  .cs-h .tagx{margin-left:auto;font-size:10.5px;color:#0A4ED9;background:#fff;border:1px solid #DCE8FF;padding:2px 9px;border-radius:10px;font-weight:600}

  .warn li::before{content:"!";position:absolute;left:3px;color:#9a6a13;font-weight:700}
  .red li::before{content:"+";position:absolute;left:2px;color:#C0392B;font-weight:700}

  /* dock */
  /* intake form */
  .formcard{background:#fff;border:1px solid #DCE8FF;border-radius:16px;box-shadow:0 8px 26px rgba(10,50,110,.08);overflow:hidden;opacity:0;transform:translateY(8px);transition:.4s}

  .fc-h{padding:13px 16px;background:linear-gradient(180deg,#EAF1FF,#F5F8FF);border-bottom:1px solid #DCE8FF}
  .fc-h b{font-size:13.5px;color:#0A4ED9}
  .fc-h p{font-size:11.5px;color:#6B7280;margin-top:2px}

  .fq .ql{font-size:12.5px;font-weight:600;color:#374151;margin-bottom:8px}

  .fc-foot{padding:2px 16px 16px;display:flex;gap:12px;align-items:center}
  .fc-submit{background:#0A5CFF;color:#fff;border:none;border-radius:11px;padding:10px 20px;font-size:13.5px;font-weight:600;cursor:pointer;transition:background .15s}
  .fc-submit:hover{background:#084ED9}
  .fc-skip{background:transparent;border:none;color:#6B7280;font-size:12.5px;cursor:pointer}
  .fc-skip:hover{color:#111827}

  .dock{flex:0 0 auto;background:transparent;padding:6px 26px 14px}
  .composer{max-width:760px;margin:0 auto;background:#fff;border:1px solid #E9EBEF;border-radius:20px;box-shadow:0 10px 34px rgba(0,0,0,.05);padding:6px;transition:.15s}
  .composer:focus-within{border-color:#BFDBFE;box-shadow:0 4px 12px rgba(10,92,255,.06),0 0 0 3px #E6F0FF}
  .composer textarea{width:100%;border:none;background:transparent;resize:none;font:inherit;font-size:14.5px;line-height:1.5;color:#111827;outline:none;padding:10px 16px 2px;min-height:36px;max-height:140px}
  .composer-bar{display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:4px 8px 6px}
  .ghost-btn{background:transparent;border:none;color:#9CA3AF;cursor:pointer;padding:8px;border-radius:9999px;display:flex;transition:.13s}
  .ghost-btn:hover{background:#F3F4F6;color:#111827}
  .ghost-btn svg{width:18px;height:18px}
  .send{background:#0A5CFF;color:#fff;border:none;border-radius:12px;width:40px;height:40px;display:grid;place-items:center;cursor:pointer;flex:0 0 auto;transition:background .15s}

  .send:disabled{opacity:.4;cursor:not-allowed}
  .send svg{width:18px;height:18px}
  .dhint{max-width:760px;margin:8px auto 0;text-align:center;font-size:11px;color:#9CA3AF}
</style>

    ],
    consensus:{
      agree:["What you're describing most likely has a manageable, non-urgent cause.","Start with simple, low-risk steps and track how things change.","Reassess in a couple of weeks; note anything new."],
      open:["The exact cause isn't certain from this alone — more detail or a check-up would narrow it down."],
      red:["Rapidly worsening symptoms, high fever, severe pain, or new weakness — seek care promptly."],
    },
  },
};

const INTAKE = {
  sleep:[
    {key:"where",label:"Where is it?",type:"multi",options:["Forehead","Both sides","One side","Behind the eyes","Back of head"]},
    {key:"dur",label:"How long has it been going on?",type:"single",options:["Under a week","1–4 weeks","1–3 months","Over 3 months"]},
    {key:"feel",label:"What does it feel like?",type:"multi",options:["Pressing / tight","Throbbing","Sharp","Dull ache"]},
    {key:"assoc",label:"Anything alongside it?",type:"multi",options:["Nausea","Light sensitivity","Vision changes","Fever","None"]},
  ],
  heart:[
    {key:"sym",label:"Any of these symptoms?",type:"multi",options:["Chest tightness","Palpitations","Breathlessness","Dizziness","None"]},
    {key:"bp",label:"Your blood pressure is usually…",type:"single",options:["Normal","Slightly high","High","Not sure"]},
    {key:"chol",label:"Cholesterol level?",type:"single",options:["Normal","Borderline","High","Not sure"]},
    {key:"risk",label:"Any risk factors?",type:"multi",options:["Smoking","Family history","Overweight","Diabetes","None"]},
  ],
  meds:[
    {key:"meds",label:"Which medications? (names)",type:"text",ph:"e.g. metformin, ibuprofen"},
    {key:"concern",label:"Your main concern is…",type:"single",options:["Can I combine them","Side effects","Right dose","Timing"]},
    {key:"react",label:"Any reactions so far?",type:"multi",options:["Rash","Stomach upset","Drowsiness","None"]},
  ],
  report:[
    {key:"type",label:"What kind of report?",type:"single",options:["Blood panel","Imaging","Other"]},
    {key:"flag",label:"Which values look off? (optional)",type:"text",ph:"e.g. LDL 4.1, glucose 6.9"},
    {key:"sym",label:"Any symptoms?",type:"multi",options:["None","Fatigue","Pain","Other"]},
  ],
  default:[
    {key:"area",label:"Where / what area is affected?",type:"text",ph:"e.g. lower back, stomach"},
    {key:"dur",label:"How long has it been going on?",type:"single",options:["Under a week","1–4 weeks","Over a month"]},
    {key:"sev",label:"How severe?",type:"single",options:["Mild","Moderate","Severe"]},
    {key:"assoc",label:"Other symptoms? (optional)",type:"text",ph:"anything else you noticed"},
  ],
};

function triage(q){
  const s = (q||"").toLowerCase();
  if(/sleep|insomnia|headache|migraine|tired|fatigue|stress|anxious|anxiety/.test(s)) return "sleep";
  if(/heart|blood pressure|\bbp\b|chest|cholesterol|lipid|palpitation|hypertension/.test(s)) return "heart";
  if(/\bmeds?\b|drug|pill|tablet|medication|interaction|together|safe to take/.test(s)) return "meds";
  if(/report|lab|result|test|panel|value|thyroid|glucose|sugar|diabetes|vitamin|hormone/.test(s)) return "report";
  return "default";
}

const RECENTS = ["Cholesterol panel — second read","2-day headache, which department?","Can I take these two meds together?","Annual checkup — interpret results","Persistent cough — is it serious?"];
const recEl = document.getElementById('recents');
RECENTS.forEach(t=>{const d=document.createElement('div');d.className='recent';d.textContent=t;recEl.appendChild(d)});

const thread = document.getElementById('thread');
const scroll = document.querySelector('.scroll');
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const down = () => { scroll.scrollTop = scroll.scrollHeight; };
const docPin = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>';
const avatar = i => `<div class="av"><img src="${DOCS[i].img}" alt=""></div>`;

function userMsg(t){
  const el=document.createElement('div'); el.className='msg user in';
  el.innerHTML=`<div class="av">YOU</div><div class="bubble"><p></p></div>`;
  el.querySelector('p').textContent=t; thread.appendChild(el); down();
}
function sysline(t){ const el=document.createElement('div'); el.className='sysline'; el.textContent=t; thread.appendChild(el); down(); }

async function say(m){
  const d=DOCS[m.i];
  const el=document.createElement('div'); el.className='msg in';
  el.innerHTML=`${avatar(m.i)}<div class="bubble"><div class="bh"><span class="bn">${d.n}</span><span class="round">${m.round}</span></div><div class="typing"><i></i><i></i><i></i></div></div>`;
  thread.appendChild(el); down(); await sleep(780);
  el.querySelector('.bubble').innerHTML =
    `<div class="bh"><span class="bn">${d.n}</span><span class="br">${d.dept}</span><span class="round">${m.round}</span></div>
     <p>${m.txt}</p>${m.cite?`<div class="cite">${docPin}<span>Source · <b>${m.cite}</b></span></div>`:""}`;
  down(); await sleep(450);
}

async function assemblePanel(c){
  const wrap=document.createElement('div'); wrap.className='thinking';
  wrap.innerHTML='<span class="spin"></span> Matching you with the right specialists…';
  thread.appendChild(wrap); down(); await sleep(1200); wrap.remove();

  const card=document.createElement('div'); card.className='panelcard';
  card.innerHTML=`<div class="pc-h">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      <b>Your panel for this case</b><span class="why">${c.why}</span></div>
    <div class="pc-docs">${c.docs.map(i=>`
      <div class="pc-doc">${avatar(i)}<div><div class="nm">${DOCS[i].n}</div><div class="de">${DOCS[i].dept}</div></div><span class="tag">Assigned</span></div>`).join("")}</div>`;
  thread.appendChild(card); down();
  requestAnimationFrame(()=>card.classList.add('in'));
  await sleep(700);
}

function consensusCard(cs){
  const el=document.createElement('div'); el.className='consensus';
  el.innerHTML=`
    <div class="cs-h"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><b>Panel consensus</b><span class="tagx">agreed together</span></div>
    <div class="cs-b ok"><div class="cs-l"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>What we agree on</div><ul>${cs.agree.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    <div class="cs-b warn"><div class="cs-l"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>Worth discussing / still open</div><ul>${cs.open.map(x=>`<li>${x}</li>`).join("")}</ul></div>
    <div class="cs-b red"><div class="cs-l"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>See a doctor if…</div><ul>${cs.red.map(x=>`<li>${x}</li>`).join("")}</ul></div>`;
  thread.appendChild(el); down();
  requestAnimationFrame(()=>el.classList.add('in'));
}

// ----- intake form (clarifying questions) -----
function collectIntake(schema){
  return new Promise(resolve=>{
    const body = schema.map(q=>{
      if(q.type==="text"){
        return `<div class="fq"><div class="ql">${q.label}</div><input type="text" data-q="${q.key}" placeholder="${q.ph||''}"></div>`;
      }
      const chips = q.options.map(o=>`<span class="fchip" data-q="${q.key}" data-v="${o}" data-t="${q.type}">${o}</span>`).join("");
      return `<div class="fq"><div class="ql">${q.label}</div><div class="fchips">${chips}</div></div>`;
    }).join("");
    const card=document.createElement('div'); card.className='formcard';
    card.innerHTML=`<div class="fc-h"><b>A few quick questions</b><p>This helps the panel give you a sharper answer.</p></div>
      <div class="fc-body">${body}</div>
      <div class="fc-foot"><button class="fc-submit">Submit to the panel</button><button class="fc-skip">Skip</button></div>`;
    thread.appendChild(card); down(); requestAnimationFrame(()=>card.classList.add('in'));

    const state={}; schema.forEach(q=> state[q.key]= q.type==='multi'?[]:'' );
    card.querySelectorAll('.fchip').forEach(ch=>{
      ch.addEventListener('click',()=>{
        const qk=ch.dataset.q, val=ch.dataset.v, type=ch.dataset.t;
        if(type==='single'){ card.querySelectorAll(`.fchip[data-q="${qk}"]`).forEach(x=>x.classList.remove('on')); ch.classList.add('on'); state[qk]=val; }
        else { ch.classList.toggle('on'); const arr=state[qk]; const i=arr.indexOf(val); if(i>=0)arr.splice(i,1); else arr.push(val); }
      });
    });
    card.querySelectorAll('input[type=text]').forEach(inp=>inp.addEventListener('input',()=>state[inp.dataset.q]=inp.value));
    function finish(skipped){ card.querySelector('.fc-foot').remove(); card.classList.add('done'); resolve({state,schema,skipped}); }
    card.querySelector('.fc-submit').addEventListener('click',()=>finish(false));
    card.querySelector('.fc-skip').addEventListener('click',()=>finish(true));
  });
}
function answersMsg(a){
  const el=document.createElement('div'); el.className='msg user in';
  el.innerHTML=`<div class="av">YOU</div><div class="bubble"><p></p></div>`;
  const p=el.querySelector('p');
  if(a.skipped){ p.textContent="(Skipped the questions.)"; }
  else {
    const lines=a.schema.map(q=>{ const v=a.state[q.key]; const val=Array.isArray(v)?v.join(', '):v; return (val&&val.trim&&val.trim()||Array.isArray(v)&&v.length)? `${q.label.replace(/\s*\(optional\)/,'').replace(/[?？]$/,'')}: ${val}`:null; }).filter(Boolean);
    p.style.whiteSpace='pre-line';
    p.textContent = lines.length? lines.join('\n') : "Submitted.";
  }
  thread.appendChild(el); down();
}

let CURRENT;
async function run(q){
  userMsg(q);
  const key = triage(q);
  const c = CASES[key]; CURRENT = c;
  await sleep(450);
  await say({i:5,round:"Intake",txt:"Thanks for that. Before the panel weighs in, a few quick questions so we get the details right.",cite:""});
  const answers = await collectIntake(INTAKE[key] || INTAKE.default);
  answersMsg(answers);
  sysline("Reviewing your case");
  await sleep(450);
  document.getElementById('panelMini').innerHTML =
    `<div class="pm-avs">${c.docs.slice(0,3).map(i=>`<div class="a"><img src="${DOCS[i].img}" alt=""></div>`).join("")}</div><span class="pm-t">Your panel</span>`;
  await assemblePanel(c);
  sysline("The panel is deliberating");
  for(const m of c.msgs){ await say(m); }
  await sleep(200);
  consensusCard(c.consensus);
  enableDock();
}

// follow-up
const reply=document.getElementById('reply'), send=document.getElementById('send');
function enableDock(){ reply.disabled=false; send.disabled=true; reply.focus(); }
reply.addEventListener('input',()=>{ send.disabled=!reply.value.trim(); reply.style.height='auto'; reply.style.height=Math.min(reply.scrollHeight,120)+'px'; });
reply.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!send.disabled) follow(); } });
send.addEventListener('click',()=>{ if(!send.disabled) follow(); });
let busy=false;
async function follow(){
  if(busy) return; busy=true; const t=reply.value.trim();
  userMsg(t); reply.value=''; reply.style.height='auto'; send.disabled=true;
  await sleep(300);
  await say({i:3,round:"Re: your question",txt:"Good question — based on what the panel established, this stays within our guidance. The key open points still depend on your specifics, so bring those to an in-person visit.",cite:"Evidence Review"});
  await say({i:CURRENT.docs[0],round:"Adding",txt:"Happy to go deeper on any one point above — just tell me which part you'd like the panel to focus on.",cite:""});
  busy=false; send.disabled=!reply.value.trim();
}

// start from ?q
const q = new URLSearchParams(location.search).get('q') || "I keep getting headaches and I'm not sleeping well.";
run(q);
</script>
